<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Notes | تذكير داخلي فوري (بدون PWA)</title>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #242424; min-height: 100vh; color: white; font-family: system-ui, 'Segoe UI', sans-serif; overflow-x: hidden; }
        .header { width: 100%; height: 75px; background: #9b59ff; display: flex; justify-content: space-between; align-items: center; padding: 0 25px; }
        .logo { color: white; font-size: 24px; font-family: 'Pacifico', cursive; }
        .menu-btn { background: transparent; border: none; cursor: pointer; width: 44px; height: 44px; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 5px; }
        .menu-line { width: 26px; height: 3px; background: white; border-radius: 4px; }
        .side-navbar { position: fixed; top: 0; right: -320px; width: 290px; height: 100vh; background: #1e1e2f; z-index: 1000; transition: right 0.3s; display: flex; flex-direction: column; border-left: 2px solid #9b59ff; }
        .side-navbar.open { right: 0; }
        .nav-header { padding: 24px 20px 12px; border-bottom: 1px solid #9b59ff60; text-align: center; }
        .nav-header h3 { font-family: 'Pacifico', cursive; font-size: 20px; color: #cdb4ff; }
        .pages-list { flex: 1; overflow-y: auto; padding: 18px 12px; display: flex; flex-direction: column; gap: 10px; }
        .page-item { background: #2a2a3a; border-radius: 18px; padding: 10px 14px; display: flex; align-items: center; gap: 12px; cursor: pointer; border: 1px solid transparent; }
        .page-item.active { border-color: #9b59ff; background: #9b59ff30; }
        .page-icon { font-size: 28px; }
        .page-name { font-size: 16px; flex: 1; }
        .add-page-btn { margin: 15px 15px 25px; background: #9b59ff; border: none; border-radius: 40px; padding: 12px; color: white; font-weight: bold; cursor: pointer; }
        .overlay-nav { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.5); z-index: 999; display: none; }
        .overlay-nav.active { display: block; }
        .notes-container { padding: 20px 18px; display: flex; flex-wrap: wrap; gap: 12px; min-height: calc(100vh - 75px); }
        .note-card { width: 140px; height: 60px; background: #2f2f2f; border-radius: 16px; overflow: hidden; display: flex; flex-direction: column; border: 1px solid rgba(155, 89, 255, 0.4); cursor: pointer; }
        .note-card:hover { border-color: #9b59ff; }
        .note-header { height: 28px; background: #9b59ff; display: flex; justify-content: center; align-items: center; font-family: 'Pacifico', cursive; font-size: 11px; padding: 0 6px; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .note-icon-area { flex: 1; background: #2c2c2c; display: flex; justify-content: center; align-items: center; }
        .icon-display { font-size: 30px; }
        .add-btn { position: fixed; bottom: 22px; left: 22px; width: 55px; height: 55px; border: none; border-radius: 50%; background: #9b59ff; color: white; font-size: 34px; cursor: pointer; z-index: 100; }
        .details-overlay { position: fixed; inset: 0; background: #1a1a2e; z-index: 2000; display: none; justify-content: center; align-items: center; padding: 20px; }
        .details-card { background: #2a2a2a; border-radius: 48px; max-width: 650px; width: 100%; border: 2px solid #9b59ff; overflow: hidden; }
        .details-header { background: #9b59ff; padding: 22px 25px; text-align: center; }
        .details-header h1 { font-family: 'Pacifico', cursive; font-size: 32px; color: white; }
        .details-content { padding: 30px 28px; }
        .details-label { font-family: 'Pacifico', cursive; font-size: 28px; color: #cdb4ff; text-align: center; }
        .details-text { background: #1e1e2e; padding: 20px; border-radius: 28px; font-size: 18px; line-height: 1.7; color: #f0f0f0; white-space: pre-wrap; margin-top: 15px; }
        .details-close { display: flex; justify-content: center; padding: 10px 28px 30px; }
        .close-details-btn { background: #9b59ff; border: none; border-radius: 50px; padding: 12px 32px; font-size: 18px; font-weight: bold; color: white; cursor: pointer; font-family: 'Pacifico', cursive; }
        .overlay-modal, .overlay-modal-page { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(5px); display: none; justify-content: center; align-items: center; z-index: 1100; }
        .modal { width: 500px; max-width: 92%; background: #2a2a2a; border-radius: 36px; border: 1px solid #9b59ff; padding: 22px 20px 26px; max-height: 90vh; overflow-y: auto; }
        .modal-title { text-align: center; font-size: 24px; margin-bottom: 16px; font-family: 'Pacifico', cursive; color: #cdb4ff; }
        .form-label { display: block; margin-top: 16px; margin-bottom: 6px; font-weight: 600; font-size: 0.85rem; }
        .form-input, .form-textarea { width: 100%; background: #3c3c3c; color: white; border: 2px solid #6c3eb8; border-radius: 24px; padding: 10px 16px; outline: none; font-size: 0.9rem; }
        .form-textarea { min-height: 80px; resize: vertical; }
        .icons-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(55px, 1fr)); gap: 10px; margin-top: 10px; background: #1f1f1f; padding: 12px 10px; border-radius: 24px; max-height: 180px; overflow-y: auto; }
        .icon-option { background: #2f2f2f; border-radius: 20px; padding: 8px 4px; display: flex; justify-content: center; cursor: pointer; border: 2px solid transparent; }
        .icon-big-preview { font-size: 32px; }
        .icon-option.selected { border-color: #9b59ff; background: #3a2a5a; }
        .time-hint { font-size: 10px; color: #aaa; margin-top: 4px; }
        .run-btn { width: 100%; margin-top: 22px; padding: 11px; border: none; border-radius: 60px; background: #9b59ff; color: white; font-size: 17px; font-weight: bold; cursor: pointer; }
        /* إشعار واتساب داخلي */
        .whatsapp-notification { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #25D366; color: white; padding: 14px 24px; border-radius: 50px; z-index: 3000; display: flex; align-items: center; gap: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.4); font-weight: bold; animation: slideDown 0.3s ease; max-width: 90%; text-align: center; border-bottom: 3px solid #075E54; }
        .whatsapp-notification::before { content: "💬"; font-size: 24px; }
        @keyframes slideDown { from { top: -100px; opacity: 0; } to { top: 20px; opacity: 1; } }
        @media (max-width: 550px) { .note-card { width: 120px; height: 55px; } }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">My Notes</div>
    <button class="menu-btn" id="menuToggleBtn"><div class="menu-line"></div><div class="menu-line"></div><div class="menu-line"></div></button>
</div>

<div class="notes-container" id="notesContainer"></div>
<button class="add-btn" onclick="openModal()">+</button>

<div class="side-navbar" id="sideNavbar">
    <div class="nav-header"><h3>📚 صفحاتي</h3></div>
    <div class="pages-list" id="pagesList"></div>
    <button class="add-page-btn" id="openAddPageModalBtn">➕ صفحة جديدة</button>
</div>
<div class="overlay-nav" id="overlayNav"></div>

<div class="overlay-modal" id="overlayModal">
    <div class="modal">
        <div class="modal-title">📝 ملاحظة جديدة</div>
        <label class="form-label">🏷️ عنوان الملاحظة</label>
        <input type="text" id="noteName" class="form-input" placeholder="مثال: اجتماع مهم">
        <label class="form-label">📄 التفاصيل</label>
        <textarea id="noteDetails" class="form-textarea" placeholder="اكتب التفاصيل هنا..."></textarea>
        <label class="form-label">⏰ وقت التذكير (سيظهر إشعار واتساب)</label>
        <input type="datetime-local" id="noteTime" class="form-input">
        <div class="time-hint">🔔 عند حلول الوقت، سيظهر إشعار أخضر يشبه الواتساب</div>
        <label class="form-label">🎨 اختر أيقونة</label>
        <div class="icons-grid" id="iconsGrid"></div>
        <button class="run-btn" onclick="createNote()">📌 إنشاء</button>
    </div>
</div>

<div class="overlay-modal-page" id="overlayPageModal">
    <div class="modal">
        <div class="modal-title">📖 صفحة جديدة</div>
        <label class="form-label">📛 اسم الصفحة</label>
        <input type="text" id="pageName" class="form-input" placeholder="مثال: الرياضيات">
        <label class="form-label">🎨 اختر لوجو</label>
        <div class="icons-grid" id="pageIconsGrid"></div>
        <button class="run-btn" onclick="createNewPage()">➕ إنشاء</button>
    </div>
</div>

<div class="details-overlay" id="detailsOverlay">
    <div class="details-card">
        <div class="details-header"><h1>التفاصيل</h1></div>
        <div class="details-content"><div class="details-label">📋 :</div><div class="details-text" id="detailsTextContent"></div></div>
        <div class="details-close"><button class="close-details-btn" onclick="closeDetails()">إغلاق</button></div>
    </div>
</div>

<script>
    const ICON_LIST = ["✍️","📝","🔧","📐","📏","🧮","∑","∫","√","π","∞","📖","📚","✖️","÷","🧪","⚗️","🔬","🧬","📊","📈","💡","🧠","🎨","💻","🔭","✏️","🖌️","📘","⭐","❤️"];
    let pages = [], currentPageId = null, currentSelectedIcon = "✍️", currentSelectedPageIcon = "📘";

    function escapeHtml(str) { if (!str) return ""; return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m] || m)); }
    function saveToLocalStorage() { localStorage.setItem("notes_final_working", JSON.stringify({ pages, currentPageId })); }
    
    function loadFromLocalStorage() {
        const stored = localStorage.getItem("notes_final_working");
        if (stored) {
            try {
                const data = JSON.parse(stored);
                pages = data.pages || [];
                currentPageId = data.currentPageId || null;
                for (let p of pages) {
                    if (!p.id) p.id = Date.now() + Math.random();
                    if (!p.notes) p.notes = [];
                    if (!p.icon) p.icon = "📘";
                    for (let n of p.notes) { if (n.details === undefined) n.details = ""; if (n.reminderTime === undefined) n.reminderTime = null; }
                }
            } catch(e) { resetDefaultData(); }
        } else { resetDefaultData(); }
        renderPagesList();
        renderCurrentPageNotes();
    }

    function resetDefaultData() {
        pages = [
            { id: "math_" + Date.now(), name: "الرياضيات", icon: "📐", notes: [] },
            { id: "arabic_" + (Date.now() + 1), name: "العربي", icon: "📖", notes: [] }
        ];
        currentPageId = pages[0].id;
        saveToLocalStorage();
    }

    function renderPagesList() {
        const container = document.getElementById("pagesList");
        container.innerHTML = "";
        for (let page of pages) {
            const div = document.createElement("div");
            div.className = "page-item";
            if (currentPageId === page.id) div.classList.add("active");
            div.innerHTML = `<div class="page-icon">${page.icon}</div><div class="page-name">${escapeHtml(page.name)}</div>`;
            div.addEventListener("click", () => { currentPageId = page.id; saveToLocalStorage(); renderPagesList(); renderCurrentPageNotes(); closeSidebar(); showToast(`📂 ${page.name}`); });
            container.appendChild(div);
        }
    }

    function renderCurrentPageNotes() {
        const container = document.getElementById("notesContainer");
        container.innerHTML = "";
        const currentPage = pages.find(p => p.id === currentPageId);
        if (!currentPage || !currentPage.notes.length) return;
        const reversed = [...currentPage.notes].reverse();
        for (let note of reversed) container.appendChild(createNoteCard(note));
    }

    function createNoteCard(note) {
        const card = document.createElement("div");
        card.className = "note-card";
        card.innerHTML = `<div class="note-header">${escapeHtml(note.title)}</div><div class="note-icon-area"><div class="icon-display">${note.icon || "📘"}</div></div>`;
        card.addEventListener("click", () => openDetailsPage(note));
        card.addEventListener("dblclick", (e) => { e.stopPropagation(); if (confirm("🗑️ حذف؟")) deleteNote(note.id); });
        return card;
    }

    function openDetailsPage(note) {
        document.getElementById("detailsTextContent").innerHTML = (note.details && note.details.trim()) ? escapeHtml(note.details).replace(/\n/g,'<br>') : "📭 لا توجد تفاصيل";
        document.getElementById("detailsOverlay").style.display = "flex";
    }
    function closeDetails() { document.getElementById("detailsOverlay").style.display = "none"; }
    function deleteNote(noteId) {
        const page = pages.find(p => p.id === currentPageId);
        if (page) { const idx = page.notes.findIndex(n => n.id == noteId); if (idx !== -1) { page.notes.splice(idx, 1); saveToLocalStorage(); renderCurrentPageNotes(); showToast("🗑️ تم الحذف"); } }
    }

    // إشعار واتساب داخلي (يظهر في الصفحة نفسها)
    function showWhatsAppNotification(title, details, pageName) {
        const notificationDiv = document.createElement("div");
        notificationDiv.className = "whatsapp-notification";
        notificationDiv.innerHTML = `<strong>🔔 تذكير واتساب</strong><br>📌 ${escapeHtml(title)}<br>📁 ${escapeHtml(pageName)}<br>📄 ${escapeHtml(details && details.length > 60 ? details.substring(0,60)+"..." : (details || "لا توجد تفاصيل"))}`;
        document.body.appendChild(notificationDiv);
        
        // تشغيل صوت تنبيه (اختياري)
        try {
            const audio = new Audio('data:audio/wav;base64,U3RlYWx0aCBpcwo=');
            audio.play().catch(()=>{});
        } catch(e) {}
        
        setTimeout(() => { notificationDiv.style.animation = "slideDown 0.3s reverse"; setTimeout(() => notificationDiv.remove(), 300); }, 5000);
        
        // هز الصفحة
        document.body.style.animation = "shake 0.3s ease";
        setTimeout(() => { document.body.style.animation = ""; }, 300);
    }

    // مراقب التذكيرات (كل 10 ثواني)
    function startReminderWatcher() {
        setInterval(() => {
            const now = new Date();
            const nowRounded = new Date(now.getFullYear(), now.getMonth(), now.getDate(), now.getHours(), now.getMinutes(), 0);
            for (let page of pages) {
                for (let note of page.notes) {
                    if (note.reminderTime && note.reminderTime !== "") {
                        const reminderDate = new Date(note.reminderTime);
                        if (!isNaN(reminderDate.getTime())) {
                            const remRounded = new Date(reminderDate.getFullYear(), reminderDate.getMonth(), reminderDate.getDate(), reminderDate.getHours(), reminderDate.getMinutes(), 0);
                            if (remRounded.getTime() === nowRounded.getTime() && !note._notified) {
                                note._notified = true;
                                saveToLocalStorage();
                                showWhatsAppNotification(note.title, note.details, page.name);
                            } else if (remRounded.getTime() !== nowRounded.getTime() && note._notified) {
                                note._notified = false;
                                saveToLocalStorage();
                            }
                        }
                    }
                }
            }
        }, 10000);
    }

    function createNote() {
        const title = document.getElementById("noteName").value.trim();
        const details = document.getElementById("noteDetails").value;
        const chosenIcon = currentSelectedIcon;
        const reminderTime = document.getElementById("noteTime").value;
        if (!title) { showToast("⚠️ أدخل عنوان"); return; }
        const page = pages.find(p => p.id === currentPageId);
        if (!page) { showToast("❌ اختر صفحة"); return; }
        
        const newNote = { id: Date.now() + Math.random(), title: title, details: details || "", icon: chosenIcon, reminderTime: (reminderTime && reminderTime !== "") ? reminderTime : null, createdAt: new Date().toISOString(), _notified: false };
        page.notes.push(newNote);
        saveToLocalStorage();
        renderCurrentPageNotes();
        document.getElementById("overlayModal").style.display = "none";
        document.getElementById("noteName").value = "";
        document.getElementById("noteDetails").value = "";
        document.getElementById("noteTime").value = "";
        currentSelectedIcon = "✍️";
        renderIconsGrid("iconsGrid", currentSelectedIcon, (icon) => { currentSelectedIcon = icon; });
        showToast(`✅ تم إضافة "${title}"`);
    }

    function createNewPage() {
        let name = document.getElementById("pageName").value.trim();
        let icon = currentSelectedPageIcon;
        if (!name) { showToast("⚠️ أدخل اسم الصفحة"); return; }
        const newPage = { id: Date.now() + Math.random(), name: name, icon: icon, notes: [] };
        pages.push(newPage);
        currentPageId = newPage.id;
        saveToLocalStorage();
        renderPagesList();
        renderCurrentPageNotes();
        document.getElementById("overlayPageModal").style.display = "none";
        document.getElementById("pageName").value = "";
        currentSelectedPageIcon = "📘";
        renderIconsGrid("pageIconsGrid", currentSelectedPageIcon, (icon) => { currentSelectedPageIcon = icon; });
        closeSidebar();
        showToast(`📖 صفحة "${name}" تم إنشاؤها`);
    }

    function renderIconsGrid(containerId, selectedIcon, onSelect) {
        const grid = document.getElementById(containerId);
        grid.innerHTML = "";
        ICON_LIST.forEach(icon => {
            const opt = document.createElement("div");
            opt.className = "icon-option";
            if (selectedIcon === icon) opt.classList.add("selected");
            opt.innerHTML = `<div class="icon-big-preview">${icon}</div>`;
            opt.addEventListener("click", () => {
                document.querySelectorAll(`#${containerId} .icon-option`).forEach(el => el.classList.remove("selected"));
                opt.classList.add("selected");
                onSelect(icon);
            });
            grid.appendChild(opt);
        });
    }

    function showToast(msg) {
        let toast = document.createElement("div");
        toast.innerText = msg;
        toast.style.position = "fixed";
        toast.style.bottom = "80px";
        toast.style.left = "50%";
        toast.style.transform = "translateX(-50%)";
        toast.style.backgroundColor = "#9b59ff";
        toast.style.padding = "8px 20px";
        toast.style.borderRadius = "40px";
        toast.style.fontSize = "13px";
        toast.style.zIndex = "1300";
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }

    function openModal() { if (!currentPageId) { showToast("⚠️ اختر صفحة"); return; } document.getElementById("overlayModal").style.display = "flex"; document.getElementById("noteName").value = ""; document.getElementById("noteDetails").value = ""; document.getElementById("noteTime").value = ""; currentSelectedIcon = "✍️"; renderIconsGrid("iconsGrid", currentSelectedIcon, (icon) => { currentSelectedIcon = icon; }); }
    function openAddPageModal() { document.getElementById("overlayPageModal").style.display = "flex"; document.getElementById("pageName").value = ""; currentSelectedPageIcon = "📘"; renderIconsGrid("pageIconsGrid", currentSelectedPageIcon, (icon) => { currentSelectedPageIcon = icon; }); }
    function closeSidebar() { document.getElementById("sideNavbar").classList.remove("open"); document.getElementById("overlayNav").classList.remove("active"); }
    function openSidebar() { document.getElementById("sideNavbar").classList.add("open"); document.getElementById("overlayNav").classList.add("active"); }

    // إضافة تأثير اهتزاز
    const style = document.createElement('style');
    style.textContent = `@keyframes shake { 0% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } 100% { transform: translateX(0); } }`;
    document.head.appendChild(style);

    document.getElementById("overlayModal").addEventListener("click", function(e) { if (e.target === this) this.style.display = "none"; });
    document.getElementById("overlayPageModal").addEventListener("click", function(e) { if (e.target === this) this.style.display = "none"; });
    document.getElementById("detailsOverlay").addEventListener("click", function(e) { if (e.target === this) closeDetails(); });
    document.getElementById("menuToggleBtn").addEventListener("click", openSidebar);
    document.getElementById("overlayNav").addEventListener("click", closeSidebar);
    document.getElementById("openAddPageModalBtn").addEventListener("click", () => { closeSidebar(); openAddPageModal(); });
    document.addEventListener("keydown", (e) => { if (e.key === "Escape") { closeDetails(); document.getElementById("overlayModal").style.display = "none"; document.getElementById("overlayPageModal").style.display = "none"; closeSidebar(); } });
    
    window.createNote = createNote; window.openModal = openModal; window.createNewPage = createNewPage; window.closeDetails = closeDetails;
    
    function init() { loadFromLocalStorage(); renderIconsGrid("iconsGrid", "✍️", (icon) => { currentSelectedIcon = icon; }); renderIconsGrid("pageIconsGrid", "📘", (icon) => { currentSelectedPageIcon = icon; }); startReminderWatcher(); }
    document.addEventListener("DOMContentLoaded", init);
</script>
</body>
</html>
